<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FitClub — система управления фитнес-клубом">
  <title>FitClub — Сервис фитнес-клуба</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <!-- Экран входа -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <span class="logo-emoji">🏋️</span>
        <h2>FitClub</h2>
        <p>Сервис фитнес-клуба</p>
      </div>
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="example@mail.ru" value="anna@mail.ru">
      </div>
      <div class="form-group">
        <label for="login-password">Пароль</label>
        <input type="password" id="login-password" placeholder="Введите пароль" value="123456">
      </div>
      <div class="form-group">
        <label for="login-role">Войти как</label>
        <select id="login-role">
          <option value="client">Клиент</option>
          <option value="coach">Тренер</option>
          <option value="admin">Администратор</option>
        </select>
      </div>
      <button class="btn btn-primary btn-full" id="login-btn" onclick="handleLogin()">Войти</button>
      <p style="text-align:center;margin-top:16px;font-size:12px;color:var(--text-muted)">
        Демо: anna@mail.ru / 123456 (клиент)<br>
        maria@mail.ru / 123456 (тренер)<br>
        admin@fitness.ru / admin (админ)
      </p>
    </div>
  </div>

  <!-- Основной интерфейс -->
  <div id="app" style="display:none;">
    <button class="mobile-toggle" onclick="toggleSidebar()">☰</button>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">🏋️</div>
        <h1>FitClub</h1>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="user-avatar"></div>
          <div class="user-details">
            <div class="user-name" id="user-name-display"></div>
            <div class="user-role" id="user-role-display"></div>
          </div>
        </div>
      </div>
    </aside>
    <main class="main-content" id="main-content"></main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
